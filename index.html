<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Zone Pro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { margin:0; font-family: Arial; background:#0d0d0d; color:white; }

h1 { text-align:center; color:#ff4500; }

/* TOP BAR */
.top-bar {
    display:flex;
    justify-content:center;
    gap:10px;
    padding:15px;
}

input, select {
    padding:8px;
    border-radius:5px;
    border:none;
}

/* GRID */
.movie-grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.movie-card {
    background:#1a1a1a;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}
.movie-card:hover { transform:translateY(-5px); }

.movie-card img {
    width:100%;
    height:320px;
    object-fit:cover;
}

.movie-info { padding:10px; text-align:center; }

.btn {
    background:#ff4500;
    padding:8px 10px;
    border-radius:5px;
    text-decoration:none;
    color:white;
    display:inline-block;
    margin:5px;
}

/* PLAYER */
#playerPage { display:none; padding:20px; }

video {
    width:100%;
    max-width:800px;
    display:block;
    margin:auto;
}

/* FOOTER */
footer { text-align:center; padding:20px; }

.social a {
    color:white;
    margin:10px;
    font-size:22px;
}
</style>
</head>

<body>

<h1>🔥 Movie Zone Pro</h1>

<!-- SEARCH + FILTER -->
<div class="top-bar">
<input type="text" id="search" placeholder="Search movie...">
<select id="filter">
<option value="all">All</option>
<option value="Hindi">Hindi</option>
<option value="Dubbed">Dubbed</option>
</select>
</div>

<!-- HOME -->
<div id="homePage">
<div class="movie-grid" id="movieGrid"></div>
</div>

<!-- PLAYER -->
<div id="playerPage">
<h1>🎬 Now Playing</h1>
<video id="videoPlayer" controls></video>
<br>
<button class="btn" onclick="goHome()">⬅ Back</button>
</div>

<!-- FOOTER -->
<footer>
<div class="social">
<a href="#"><i class="fab fa-facebook"></i></a>
<a href="#"><i class="fab fa-youtube"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
</div>
<p>© 2026 Movie Zone</p>
</footer>

<script>

// 🎬 MOVIE DATABASE (JSON STYLE)
const movies = [
{
title:"Animal",
year:"2023",
type:"Hindi",
img:"https://image.tmdb.org/t/p/w500/ak40OwkaH0TN2K6nlyKnMX5ucHX.jpg",
video:"sample.mp4",
download:"https://mlwbd.example/animal"
},
{
title:"Jawan",
year:"2023",
type:"Hindi",
img:"https://image.tmdb.org/t/p/w500/9bG2G2Nf1yQf1G3jW2kY5Z0Z0Z0.jpg",
video:"sample.mp4",
download:"https://mlwbd.example/jawan"
},
{
title:"KGF Chapter 2",
year:"2022",
type:"Dubbed",
img:"https://image.tmdb.org/t/p/w500/qUq5x4Z0Z0Z0Z0Z0Z0Z0Z0Z0Z.jpg",
video:"sample.mp4",
download:"https://mlwbd.example/kgf2"
}
];

// LOAD MOVIES
function loadMovies(list){
let grid = document.getElementById("movieGrid");
grid.innerHTML = "";

list.forEach(movie=>{
grid.innerHTML += `
<div class="movie-card">
<img src="${movie.img}">
<div class="movie-info">
<h3>${movie.title} (${movie.year})</h3>
<p>${movie.type}</p>

<a href="#" class="btn" onclick="playMovie('${movie.video}')">▶ Watch</a>
<a href="${movie.download}" target="_blank" class="btn">⬇ Download</a>

</div>
</div>
`;
});
}

// PLAY
function playMovie(src){
document.getElementById("homePage").style.display="none";
document.getElementById("playerPage").style.display="block";
document.getElementById("videoPlayer").src = src;
}

// BACK
function goHome(){
document.getElementById("homePage").style.display="block";
document.getElementById("playerPage").style.display="none";
}

// SEARCH + FILTER
document.getElementById("search").addEventListener("input", filterMovies);
document.getElementById("filter").addEventListener("change", filterMovies);

function filterMovies(){
let search = document.getElementById("search").value.toLowerCase();
let filter = document.getElementById("filter").value;

let filtered = movies.filter(m=>{
return (
m.title.toLowerCase().includes(search) &&
(filter === "all" || m.type === filter)
);
});

loadMovies(filtered);
}

// INIT
loadMovies(movies);

</script>

</body>
</html>
